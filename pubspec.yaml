name: latex_editor
description: A user-friendly LaTeX editor for mobile and desktop.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9 # Check for latest version

  # Storage
  shared_preferences: ^2.2.2 # Check for latest version
  path_provider: ^2.1.1 # Check for latest version

  # File Handling
  file_picker: ^6.1.1 # Check for latest version

  # Sharing/Exporting
  share_plus: ^7.2.1 # Check for latest version

  # Process Execution (for Tectonic)
  process_run: ^0.13.2 # Check for latest version, or consider alternatives like native channels

  # PDF Viewing
  flutter_pdfview: ^1.3.2 # Check for latest version

  # Process Execution (for Tectonic)
  uuid: ^4.3.3 # Check for latest version, for unique IDs

  # UI (Standard)
  cupertino_icons: ^1.0.2
  yaru: ^0.5.1 # Check for latest version of Yaru theme

  # Syntax Highlighting
  code_text_field: ^1.1.0 # Check for latest version
  flutter_highlight: ^0.7.0 # Check for latest version (dependency of code_text_field)
  highlight: ^0.7.0 # Check for latest version (dependency of flutter_highlight)


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
